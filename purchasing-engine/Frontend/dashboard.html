{% extends "layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div style="display:flex;flex:1;overflow:hidden">

  <!-- Left Sidebar -->
  <div id="sidebar" style="width:260px;min-width:260px;background-color:#1C1C1E;border-right:1px solid #3A3A3C;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:12px 16px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#98989F;margin-top:8px">
      Recents
    </div>
    <div id="history-list" style="flex:1;overflow-y:auto;padding:0 8px 16px">
      <div style="color:#98989F;font-size:12px;padding:8px">No results yet.</div>
    </div>
  </div>

  <!-- Main Dashboard Area -->
  <div id="app" class="overflow-y-auto flex-1 px-6 py-8" style="color: #FFFFFF;">
  </div>

</div>
{% endblock %}

{% block scripts %}
<style>
  .card { background-color: #2C2C2E; border: 1px solid #3A3A3C; border-radius: 12px; padding: 20px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: #98989F; margin-bottom: 14px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
  .badge-green { background: #052e16; color: #4ade80; }
  .badge-amber { background: #3d2c00; color: #fbbf24; }
  .badge-red { background: #3b0000; color: #f87171; }
  .badge-blue { background: #1e3a5f; color: #60a5fa; }
  .bar-track { height: 6px; background: #3A3A3C; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .35s ease; }
  .metric-card { background-color: #2C2C2E; border: 1px solid #3A3A3C; border-radius: 12px; padding: 16px 20px; }
  .vendor-card { background-color: #2C2C2E; border: 2px solid #3A3A3C; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .vendor-card.winner { border-color: #4F6EF7; }
  .score-note { font-size: 11px; color: #98989F; line-height: 1.4; }
  .why-not-box { background: #2a1a1a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #fca5a5; line-height: 1.5; margin-top: auto; }
  .why-not-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #f87171; margin-bottom: 4px; }
  .flip-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid #3A3A3C; }
  .flip-item:last-child { border-bottom: none; padding-bottom: 0; }
  .flip-item:first-child { padding-top: 0; }
  .expiry-bar { background: #2a2000; border: 1px solid #fde68a; border-radius: 12px; padding: 16px 20px; display: flex; align-items: flex-start; gap: 13px; }
  .lockin-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; padding: 2px 7px; border-radius: 10px; }
  .lockin-tag-low { background: #052e16; color: #4ade80; }
  .lockin-tag-medium { background: #3d2c00; color: #fbbf24; }
  .lockin-tag-high { background: #3b0000; color: #f87171; }
  .sentiment-neg { display: inline-block; font-size: 10px; background: #2a1a1a; color: #f87171; border: 1px solid #7f1d1d; border-radius: 10px; padding: 1px 8px; margin-top: 2px; }
  .pill { font-size: 10px; font-weight: 600; color: #98989F; background: #3A3A3C; border-radius: 10px; padding: 2px 8px; white-space: nowrap; }
  input[type=range] { width: 100%; accent-color: #4F6EF7; cursor: pointer; height: 4px; }
  .rank-bar-track { flex: 1; height: 10px; background: #3A3A3C; border-radius: 5px; overflow: hidden; }
  .rank-bar-fill { height: 100%; border-radius: 5px; width: 0; transition: width .3s ease, background .3s ease; }

    nav { display: none !important; }
    * { color: black !important; background: white !important; border-color: #ccc !important; }
    [style*="color:#98989F"] { color: #333 !important; }
    [style*="color:#ccc"] { color: #333 !important; }
    [style*="color:#fbbf24"] { color: #333 !important; }

    [style*="color:#f87171"] { color: #333 !important; }
    [style*="color:#60a5fa"] { color: #333 !important; }

      border: 1px solid #ccc !important;
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 16px !important;

    .vendor-card { display: block !important; width: 100% !important; margin-bottom: 16px !important; }

<script>
async function loadSession() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id') || params.get('session');

  let SESSION;
  if (sessionId) {
    try {
      const response = await fetch(`/api/session/${sessionId}`);
      if (!response.ok) throw new Error('Session not found');
      SESSION = await response.json();
    } catch (e) {
      console.error('Failed to load session:', e);
      SESSION = getDemoData();
    }
  } else {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;text-align:center">
        <div style="font-size:48px">📋</div>
        <h2 style="font-size:22px;font-weight:700;color:#fff">No results yet</h2>
        <p style="color:#98989F;font-size:15px;max-width:400px">Complete an interview first to see your vendor recommendation.</p>
        <a href="/" style="background-color:#4F6EF7;color:#fff;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;text-decoration:none;">Start an interview →</a>
      </div>`;
    return;
  }

  renderDashboard(SESSION);
}

function scoreColor(n) { return n >= 80 ? '#1D9E75' : n >= 60 ? '#EF9F27' : '#D85A30'; }
function lockinColor(lvl) { return lvl === 'low' ? '#1D9E75' : lvl === 'medium' ? '#EF9F27' : '#D85A30'; }
function lockinTagClass(lvl) { return 'lockin-tag lockin-tag-' + lvl; }
function confBadgeClass(conf) { return conf === 'high' ? 'badge-green' : conf === 'moderate' ? 'badge-amber' : 'badge-red'; }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
function fmtUSD(n) { return '$' + n.toLocaleString(); }

function scoreBarHTML(label, score, note) {
  const c = scoreColor(score);
  return `<div style="display:flex;flex-direction:column;gap:4px">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#98989F">${label}</span>
      <span style="font-size:13px;font-weight:700;color:${c}">${score}</span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${score}%;background:${c}"></div></div>
    <div class="score-note">${note}</div>
  </div>`;
}

function vendorCardHTML(v) {
  const s = v.scores;
  const whyNot = v.why_not ? `<div class="why-not-box"><div class="why-not-lbl">Why not this vendor</div>${v.why_not}</div>` : '';
  return `<div class="vendor-card" id="card-${v.id}" data-vendor-id="${v.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:18px;font-weight:700;color:#fff">${v.name}</div>
        <div style="font-size:12px;color:#98989F;margin-top:3px">${v.tagline}</div>
      </div>
      <span class="badge badge-blue top-pick-badge" id="badge-${v.id}" style="display:none">Top pick</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:8px">
      <span style="font-size:38px;font-weight:800;line-height:1" id="weighted-${v.id}">—</span>
      <span style="font-size:11px;color:#98989F;text-transform:uppercase;letter-spacing:.06em">weighted score</span>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap" id="breakdown-${v.id}"></div>
    <div style="display:flex;flex-direction:column;gap:11px">
      ${scoreBarHTML('Budget', s.budget, s.budget_note)}
      ${scoreBarHTML('Features', s.features, s.features_note)}
      ${scoreBarHTML('Compliance', s.compliance, s.compliance_note)}
      ${scoreBarHTML('Growth', s.growth, s.growth_note)}
    </div>
    ${whyNot}
  </div>`;
}

function buildVerdictBar(SESSION) {
  const rec = SESSION.recommendation;
  return `<div class="card">
    <div style="font-size:24px;font-weight:700;color:#fff;margin-bottom:8px">${rec.winner}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <span class="badge ${confBadgeClass(rec.confidence)}">${rec.confidence} confidence</span>
      <span class="badge badge-amber">⚠ Moderate regret risk</span>
    </div>
    <div style="font-size:14px;line-height:1.7;color:#ccc">${rec.summary}</div>
  </div>`;
}

function buildBiasDetector(SESSION) {
  const preferred = SESSION.profile?.search_signals?.preferred_vendor;
  const topVendor = SESSION.vendors?.[0]?.name;
  if (!preferred || !topVendor) return '';
  const isMismatch = preferred.toLowerCase() !== topVendor.toLowerCase();
  if (isMismatch) {
    return `
      <div style="background:#2a1a00;border:1px solid #f59e0b;border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;gap:12px">
        <span style="font-size:20px;margin-top:2px;flex-shrink:0">👁</span>
        <div>
          <p style="margin:0 0 4px;font-weight:600;font-size:15px;color:#fbbf24">You came in favouring ${preferred}</p>
          <p style="margin:0 0 8px;font-size:14px;color:#98989F">The data points to ${topVendor} instead. 92% of buyers start with a vendor in mind — the day-one favourite wins 80% of the time, not always because it's the best fit.</p>
          <p style="margin:0;font-size:13px;color:#98989F">Scroll down to see why ${preferred} didn't rank first.</p>
        </div>
      </div>`;
  } else {
    return `
      <div style="background:#001a2a;border:1px solid #3b82f6;border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;gap:12px">
        <span style="font-size:20px;margin-top:2px;flex-shrink:0">🛡</span>
        <div>
          <p style="margin:0 0 4px;font-weight:600;font-size:15px;color:#60a5fa">You were already leaning toward ${preferred}</p>
          <p style="margin:0;font-size:14px;color:#98989F">The data supports that — but 80% of buyers who go with their first instinct never stress-test it. The sections below do that for you.</p>
        </div>
      </div>`;
  }
}

function buildMetricCards(SESSION, winner) {
  const w = winner;
  const mhCount = SESSION.profile.must_haves.length;
  const lvl = w.lockin.level;
  const lvlLabel = lvl.charAt(0).toUpperCase() + lvl.slice(1);
  const lvlColor = lockinColor(lvl);
  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
    <div class="metric-card">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#98989F">Budget fit</div>
      <div style="font-size:32px;font-weight:800;line-height:1;margin:8px 0 4px;color:#1D9E75">${w.scores.budget}</div>
      <div style="font-size:11px;color:#98989F">/100 — ${w.name}</div>

function reorderCards(orderedIds) {
  const grid = document.getElementById('vendor-grid');
  const cards = orderedIds.map(id => document.getElementById('card-' + id));
  const first = cards.map(c => c.getBoundingClientRect());
  cards.forEach(c => grid.appendChild(c));
  cards.forEach((c, i) => {
    const last = c.getBoundingClientRect();
    const dx = first[i].left - last.left;
    const dy = first[i].top - last.top;
    c.style.transition = 'none';
    c.style.transform = `translate(${dx}px,${dy}px)`;
  });
  requestAnimationFrame(() => {
    cards.forEach(c => {
      c.style.transition = 'transform 0.3s ease';
      c.style.transform = '';
    });
  });
}

function updateSliders(SESSION) {
  if (!SESSION) return;
  const sliders = SESSION.slider_config || [
    { id: 'pricing', dimension: 'pricing', default_weight: 34 },
    { id: 'feature_fit', dimension: 'feature_fit', default_weight: 33 },
    { id: 'compliance', dimension: 'compliance', default_weight: 33 }
  ];

  // Read current weights
  const weights = {};
  let total = 0;
  sliders.forEach(s => {
    const el = document.getElementById('slider-' + s.id);
    const val = el ? parseInt(el.value, 10) : s.default_weight;
    weights[s.dimension] = val;
    total += val;
    const valEl = document.getElementById('val-' + s.id);
    if (valEl) valEl.textContent = val;
  });

  // Score each vendor
  const results = SESSION.vendors.map(v => {
    const ds = v.dimension_scores || {};
    let weighted = 0;
    const breakdown = {};
    if (total > 0) {
      sliders.forEach(s => {
        const score = ds[s.dimension] || 0;
        const contribution = (score * (weights[s.dimension] || 0)) / total;
        weighted += contribution;
        breakdown[s.id] = contribution;
      });
    }
    return { v, weighted, breakdown };
  });

  // Update vendor cards
  results.forEach(r => {
    const el = document.getElementById('weighted-' + r.v.id);
    if (el) {
      el.textContent = Math.round(r.weighted);
      el.style.color = scoreColor(r.weighted);
    }
    const bkEl = document.getElementById('breakdown-' + r.v.id);
    if (bkEl) {
      bkEl.innerHTML = sliders.map(s =>
        `<span class="pill">${s.label} ${Math.round(r.breakdown[s.id] || 0)}pts</span>`
      ).join('');
    }
  });

  // Rank and reorder
  const ranked = [...results].sort((a, b) => b.weighted - a.weighted);
  ranked.forEach((r, i) => {
    const fill = document.getElementById('rankfill-' + r.v.id);
    if (fill) {
      fill.style.width = r.weighted + '%';
      fill.style.background = scoreColor(r.weighted);
    }
    const score = document.getElementById('rankscore-' + r.v.id);
    if (score) score.textContent = Math.round(r.weighted);
    const row = document.getElementById('rankrow-' + r.v.id);
    if (row) row.style.order = i;
  });

  results.forEach(r => {
    const card = document.getElementById('card-' + r.v.id);
    const badge = document.getElementById('badge-' + r.v.id);
    if (card) card.classList.remove('winner');
    if (badge) badge.style.display = 'none';
  });

  const topId = ranked[0].v.id;
  const topCard = document.getElementById('card-' + topId);
  const topBadge = document.getElementById('badge-' + topId);
  if (topCard) topCard.classList.add('winner');
  if (topBadge) topBadge.style.display = '';
  reorderCards(ranked.map(r => r.v.id));
}

async function loadSidebarHistory() {
  try {
    const response = await fetch('/api/history');
    const sessions = await response.json();
    const list = document.getElementById('history-list');
    const currentSessionId = new URLSearchParams(window.location.search).get('session_id') || new URLSearchParams(window.location.search).get('session');

    if (sessions.length === 0) {
      list.innerHTML = '<div style="color:#98989F;font-size:12px;padding:8px">No results yet.</div>';
      return;
    }

    list.innerHTML = sessions.map(s => `
      <div style="position:relative;display:flex;align-items:center;border-radius:8px;margin-bottom:4px;background:${s.session_id === currentSessionId ? '#2C2C2E' : 'transparent'}"
           onmouseover="this.querySelector('.dots-btn').style.opacity='1'"
           onmouseout="this.querySelector('.dots-btn').style.opacity='0'">
        <a href="/dashboard?session_id=${s.session_id}" style="flex:1;padding:10px 12px;text-decoration:none;overflow:hidden">
          <div style="font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.category}</div>
          <div style="font-size:11px;color:#98989F;margin-top:2px">→ ${s.winner}</div>
          <div style="font-size:10px;color:#98989F;margin-top:2px">${new Date(s.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}</div>
        </a>
        <div class="dots-btn" style="opacity:0;padding:6px 8px;cursor:pointer;color:#98989F;font-size:16px;flex-shrink:0;transition:opacity .15s;position:relative"
             onclick="event.stopPropagation();toggleMenu('${s.session_id}', this)">⋯
          <div id="menu-${s.session_id}" style="display:none;position:absolute;right:0;top:24px;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:8px;padding:4px;z-index:100;min-width:120px">
            <div onclick="deleteSession('${s.session_id}')" style="padding:8px 12px;font-size:12px;color:#f87171;cursor:pointer;border-radius:6px"
                 onmouseover="this.style.background='#3A3A3C'" onmouseout="this.style.background='transparent'">
              🗑 Delete
            </div>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Failed to load sidebar history:', e);
  }
}

loadSidebarHistory();
function toggleMenu(sessionId, el) {
  const menu = document.getElementById('menu-' + sessionId);
  const isVisible = menu.style.display === 'block';
  document.querySelectorAll('[id^="menu-"]').forEach(m => m.style.display = 'none');
  menu.style.display = isVisible ? 'none' : 'block';
  document.addEventListener('click', () => { menu.style.display = 'none'; }, { once: true });
}

async function deleteSession(sessionId) {
  try {
    const res = await fetch(`/api/session/${sessionId}`, { method: 'DELETE' });
    if (res.ok) {
      const currentSessionId = new URLSearchParams(window.location.search).get('session_id');
      if (sessionId === currentSessionId) {
        window.location.href = '/dashboard';
      } else {
        loadSidebarHistory();
      }
    }
  } catch (e) {
    console.error('Failed to delete session:', e);
  }
}
loadSession();
</script>
